<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="tomatoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b6b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c0392b;stop-opacity:1" />
    </linearGradient>
    <filter id="dropShadow" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="2" dy="2" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge> 
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/> 
      </feMerge>
    </filter>
  </defs>
  
  <!-- Tomato Body -->
  <circle cx="50" cy="55" r="40" fill="url(#tomatoGradient)" filter="url(#dropShadow)" />
  
  <!-- Timer Face / Highlights -->
  <path d="M50 25 A30 30 0 0 1 80 55" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" opacity="0.4" />
  
  <!-- Stem/Leaf -->
  <path d="M50 15 Q60 5 70 15 Q60 25 50 15 Z" fill="#2ecc71" />
  <path d="M50 15 Q40 5 30 15 Q40 25 50 15 Z" fill="#27ae60" />
  <path d="M50 15 L50 5" stroke="#27ae60" stroke-width="4" stroke-linecap="round" />
  
  <!-- Clock Hands -->
  <line x1="50" y1="55" x2="50" y2="35" stroke="white" stroke-width="3" stroke-linecap="round">
    <animateTransform attributeName="transform" type="rotate" from="0 50 55" to="360 50 55" dur="60s" repeatCount="indefinite" />
  </line>
  <line x1="50" y1="55" x2="65" y2="55" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.8">
    <animateTransform attributeName="transform" type="rotate" from="0 50 55" to="360 50 55" dur="3600s" repeatCount="indefinite" />
  </line>
</svg>
